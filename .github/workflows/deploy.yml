name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Generate _secret.js from template
        run: |
          cp docs/.vuepress/_secret.tpl.js docs/.vuepress/_secret.js
          sed -i "s|YOUR_BAIDU_APPID|${{ secrets.BAIDU_APPID }}|g" docs/.vuepress/_secret.js
          sed -i "s|YOUR_BAIDU_APPKEY|${{ secrets.BAIDU_APPKEY }}|g" docs/.vuepress/_secret.js

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Deploy to zmfk.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          external_repository: zmfk/zmfk.github.io
          publish_branch: master
          publish_dir: docs/.vuepress/dist
          commit_message: ${{ github.event.head_commit.message }}